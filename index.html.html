<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jornada de Cura - Superando Vícios</title>
  
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.0/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
  
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #f8fafc; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Helper para ícones
    const Icon = ({ name, size = 24, className = "" }) => {
      if (!window.lucide || !window.lucide.icons[name]) return null;
      const iconData = window.lucide.icons[name];
      const svgString = window.lucide.createElement(iconData);
      const div = document.createElement('div');
      div.innerHTML = svgString;
      const svg = div.firstChild;
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('class', className);
      return React.createElement('span', { dangerouslySetInnerHTML: { __html: svg.outerHTML } });
    };

    // Dados
    const QUOTES = [
      "Cada vez que você resiste, você está reescrevendo o seu cérebro. Continue!",
      "A vontade dura minutos, mas o orgulho de resistir dura o dia todo.",
      "O progresso não é linear. Um dia de cada vez.",
      "Você é muito maior do que os seus impulsos momentâneos."
    ];

    const DEFAULT_HABITS = [
      { id: 'porn', name: 'Pornografia / Masturbação', startTime: Date.now() - 86400000 * 2, icon: 'Shield' },
      { id: 'nails', name: 'Roer Unhas', startTime: Date.now() - 86400000 * 8, icon: 'Activity' }
    ];

    const BADGES = [
      { days: 1, title: 'Primeiro Passo', icon: 'Star' },
      { days: 3, title: 'Guerreiro', icon: 'Shield' },
      { days: 7, title: 'Uma Semana!', icon: 'Award' },
      { days: 30, title: 'Mestre do Hábito', icon: 'Crown' },
      { days: 90, title: 'Renascido', icon: 'Flame' }
    ];

    // Componente principal
    const App = () => {
      const [habits, setHabits] = useState(() => {
        const saved = localStorage.getItem('habits');
        return saved ? JSON.parse(saved) : DEFAULT_HABITS;
      });
      const [urges, setUrges] = useState(() => {
        const saved = localStorage.getItem('urges');
        return saved ? JSON.parse(saved) : [];
      });
      const [relapses, setRelapses] = useState(() => {
        const saved = localStorage.getItem('relapses');
        return saved ? JSON.parse(saved) : [];
      });
      const [notes, setNotes] = useState(() => {
        const saved = localStorage.getItem('notes');
        return saved ? JSON.parse(saved) : [];
      });
      const [now, setNow] = useState(Date.now());
      const [activeTab, setActiveTab] = useState('trackers');
      const [showEmergency, setShowEmergency] = useState(false);
      const [toast, setToast] = useState(null);
      const [resetModal, setResetModal] = useState({ show: false, habitId: null });
      const [showAddHabit, setShowAddHabit] = useState(false);
      const [newHabitName, setNewHabitName] = useState('');
      const [noteText, setNoteText] = useState('');
      const [noteMood, setNoteMood] = useState('neutral');
      const [quote] = useState(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

      // Salvar dados
      useEffect(() => localStorage.setItem('habits', JSON.stringify(habits)), [habits]);
      useEffect(() => localStorage.setItem('urges', JSON.stringify(urges)), [urges]);
      useEffect(() => localStorage.setItem('relapses', JSON.stringify(relapses)), [relapses]);
      useEffect(() => localStorage.setItem('notes', JSON.stringify(notes)), [notes]);
      
      // Timer
      useEffect(() => {
        const interval = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(interval);
      }, []);

      const showToastMsg = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      const calcTime = (startTime) => {
        const diff = Math.max(0, now - startTime);
        return {
          days: Math.floor(diff / 86400000),
          hours: Math.floor((diff % 86400000) / 3600000),
          minutes: Math.floor((diff % 3600000) / 60000),
          seconds: Math.floor((diff % 60000) / 1000),
          totalDays: diff / 86400000
        };
      };

      const handleResist = (habitId) => {
        setUrges([{ id: Date.now(), habitId, time: Date.now() }, ...urges]);
        showToastMsg("Você venceu a vontade! 🎉");
      };

      const handleRelapse = (habitId) => {
        setHabits(habits.map(h => 
          h.id === habitId ? { ...h, startTime: Date.now() } : h
        ));
        setRelapses([{ id: Date.now(), habitId, time: Date.now() }, ...relapses]);
        showToastMsg("Contador reiniciado. Novo começo!", "info");
        setResetModal({ show: false, habitId: null });
      };

      const handleSaveNote = () => {
        if (!noteText.trim()) return;
        const streak = Math.max(...habits.map(h => Math.floor(calcTime(h.startTime).totalDays)));
        setNotes([{ id: Date.now(), text: noteText, mood: noteMood, date: Date.now(), streak }, ...notes]);
        setNoteText('');
        showToastMsg("Registro salvo! 📝");
      };

      const handleAddHabit = () => {
        if (!newHabitName.trim()) return;
        setHabits([...habits, {
          id: Date.now().toString(),
          name: newHabitName,
          startTime: Date.now(),
          icon: 'Target'
        }]);
        setNewHabitName('');
        setShowAddHabit(false);
        showToastMsg(`${newHabitName} adicionado!`);
      };

      // Componentes simples
      const TimeBox = ({ val, label }) => (
        <div className="flex-1 bg-white rounded-2xl p-3 text-center border border-slate-200">
          <div className="text-2xl font-black text-slate-800">{val.toString().padStart(2, '0')}</div>
          <div className="text-xs text-slate-400 font-bold">{label}</div>
        </div>
      );

      const MoodIcon = ({ mood, size = 24 }) => {
        const icons = { good: 'Smile', bad: 'Frown', neutral: 'Meh' };
        const colors = { good: 'text-emerald-500', bad: 'text-rose-500', neutral: 'text-amber-500' };
        return React.createElement(Icon, { name: icons[mood], size, className: colors[mood] });
      };

      const allEvents = [...urges.map(u => ({ ...u, type: 'resist' })), ...relapses.map(r => ({ ...r, type: 'relapse' }))]
        .sort((a, b) => b.time - a.time);

      return React.createElement('div', { className: "min-h-screen bg-slate-50 pb-24" }, [
        // Toast
        toast && React.createElement('div', { key: 'toast', className: "fixed top-5 left-1/2 -translate-x-1/2 z-50 animate-fadeIn" },
          React.createElement('div', { className: `px-5 py-3 rounded-2xl shadow-lg text-white font-bold ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-slate-800'}` },
            toast.msg
          )
        ),

        // Header
        React.createElement('header', { key: 'header', className: "bg-gradient-to-r from-slate-800 to-slate-700 text-white sticky top-0 z-40 shadow-lg" },
          React.createElement('div', { className: "max-w-md mx-auto px-5 py-4 flex justify-between items-center" }, [
            React.createElement('div', { className: "flex items-center gap-3", key: 'logo' }, [
              React.createElement(Icon, { name: 'Heart', size: 28, className: "text-slate-200" }),
              React.createElement('h1', { className: "text-2xl font-black" }, "Jornada")
            ]),
            React.createElement('button', {
              onClick: () => setShowEmergency(true),
              className: "bg-slate-600/50 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2"
            }, [React.createElement(Icon, { name: 'AlertCircle', size: 18, key: 'icon' }), "SOS"])
          ])
        ),

        // Main
        React.createElement('main', { key: 'main', className: "max-w-md mx-auto px-4 py-6 space-y-6" }, [
          // Quote
          React.createElement('div', { className: "bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex gap-3" }, [
            React.createElement(Icon, { name: 'MessageSquare', size: 24, className: "text-slate-400 shrink-0" }),
            React.createElement('p', { className: "text-slate-600 text-sm font-medium" }, `"${quote}"`)
          ]),

          // Content based on tab
          activeTab === 'trackers' && React.createElement('div', { className: "space-y-5", key: 'trackers' }, [
            ...habits.map(habit => {
              const time = calcTime(habit.startTime);
              return React.createElement('div', { key: habit.id, className: "bg-white rounded-2xl p-5 shadow-sm border border-slate-200" }, [
                React.createElement('div', { className: "flex items-center gap-3 mb-5" }, [
                  React.createElement('div', { className: "bg-slate-100 p-3 rounded-xl" }, React.createElement(Icon, { name: habit.icon, size: 24 })),
                  React.createElement('h2', { className: "text-xl font-bold" }, habit.name)
                ]),
                React.createElement('div', { className: "flex gap-2 mb-5" }, [
                  React.createElement(TimeBox, { val: time.days, label: "DIAS" }),
                  React.createElement(TimeBox, { val: time.hours, label: "HORAS" }),
                  React.createElement(TimeBox, { val: time.minutes, label: "MIN" }),
                  React.createElement(TimeBox, { val: time.seconds, label: "SEG" })
                ]),
                React.createElement('button', {
                  onClick: () => handleResist(habit.id),
                  className: "w-full bg-emerald-600 text-white py-3 rounded-xl font-bold mb-3 hover:bg-emerald-700 transition"
                }, "✓ Senti vontade, mas resisti!"),
                React.createElement('button', {
                  onClick: () => setResetModal({ show: true, habitId: habit.id }),
                  className: "w-full text-slate-400 text-sm py-2 hover:text-rose-500 transition"
                }, "↺ Tive uma recaída")
              ]);
            }),
            React.createElement('button', {
              onClick: () => setShowAddHabit(true),
              className: "w-full py-5 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-bold hover:border-slate-400 transition"
            }, "+ Monitorar outro hábito")
          ]),

          activeTab === 'journal' && React.createElement('div', { className: "space-y-5", key: 'journal' }, [
            React.createElement('div', { className: "bg-white rounded-2xl p-5 shadow-sm" }, [
              React.createElement('h2', { className: "text-xl font-bold mb-3 flex items-center gap-2" }, [
                React.createElement(Icon, { name: 'BookOpen', size: 24 }),
                "Diário de Bordo"
              ]),
              React.createElement('div', { className: "flex gap-2 mb-4" }, [
                ['bad', 'Ruim'], ['neutral', 'Neutro'], ['good', 'Bom']
              ].map(([mood, label]) => 
                React.createElement('button', {
                  key: mood,
                  onClick: () => setNoteMood(mood),
                  className: `flex-1 py-2 rounded-xl font-bold transition ${noteMood === mood ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}`
                }, label)
              )),
              React.createElement('textarea', {
                value: noteText,
                onChange: e => setNoteText(e.target.value),
                placeholder: "Como foi seu dia? O que te ajudou ou atrapalhou?",
                className: "w-full bg-slate-50 border border-slate-200 rounded-xl p-3 min-h-[100px] mb-3"
              }),
              React.createElement('button', {
                onClick: handleSaveNote,
                className: "w-full bg-slate-800 text-white py-3 rounded-xl font-bold"
              }, "Salvar Registro")
            ]),
            React.createElement('div', { className: "space-y-3" }, [
              React.createElement('h3', { className: "font-bold text-slate-400 text-xs px-2" }, "REGISTROS ANTERIORES"),
              notes.length === 0 ? 
                React.createElement('div', { className: "text-center py-10 text-slate-400" }, "Nenhum registro ainda") :
                notes.map(note => 
                  React.createElement('div', { key: note.id, className: "bg-white rounded-xl p-4 shadow-sm border border-slate-200" }, [
                    React.createElement('div', { className: "flex justify-between items-start mb-2" }, [
                      React.createElement('div', { className: "flex items-center gap-2" }, [
                        React.createElement(MoodIcon, { mood: note.mood, size: 20 }),
                        React.createElement('span', { className: "text-xs font-bold text-slate-400" }, `Dia ${note.streak}`)
                      ]),
                      React.createElement('span', { className: "text-xs text-slate-400" }, new Date(note.date).toLocaleDateString('pt-BR'))
                    ]),
                    React.createElement('p', { className: "text-slate-700 text-sm" }, note.text)
                  ])
                )
            ])
          ]),

          activeTab === 'badges' && React.createElement('div', { className: "space-y-5", key: 'badges' }, [
            React.createElement('div', { className: "text-center mb-4" }, [
              React.createElement('h2', { className: "text-2xl font-bold" }, "Suas Conquistas"),
              React.createElement('p', { className: "text-slate-500 text-sm" }, "Dias limpos desbloqueiam medalhas")
            ]),
            ...habits.map(habit => {
              const days = Math.floor(calcTime(habit.startTime).totalDays);
              return React.createElement('div', { key: habit.id, className: "bg-white rounded-2xl p-5 shadow-sm" }, [
                React.createElement('h3', { className: "font-bold mb-4 flex items-center gap-2" }, [
                  React.createElement(Icon, { name: habit.icon, size: 20 }),
                  habit.name
                ]),
                React.createElement('div', { className: "grid grid-cols-3 gap-3" }, [
                  ...BADGES.map(badge => {
                    const unlocked = days >= badge.days;
                    return React.createElement('div', { key: badge.days, className: `text-center p-3 rounded-xl transition ${unlocked ? 'bg-slate-100 border border-slate-200' : 'opacity-40'}` }, [
                      React.createElement(Icon, { name: badge.icon, size: 28, className: unlocked ? 'text-slate-700' : 'text-slate-400' }),
                      React.createElement('div', { className: "text-xs font-bold mt-1" }, badge.title),
                      React.createElement('div', { className: "text-[10px] text-slate-400" }, `${badge.days} dias`)
                    ]);
                  })
                ])
              ]);
            })
          ]),

          activeTab === 'more' && React.createElement('div', { className: "space-y-5", key: 'more' }, [
            React.createElement('div', { className: "bg-white rounded-2xl p-5 shadow-sm" }, [
              React.createElement('h2', { className: "text-xl font-bold mb-3 flex items-center gap-2" }, [
                React.createElement(Icon, { name: 'ListPlus', size: 24 }),
                "Histórico"
              ]),
              React.createElement('div', { className: "flex gap-2 mb-4" }, [
                React.createElement('div', { className: "flex-1 text-center p-2 bg-emerald-100 rounded-xl" }, [
                  React.createElement('div', { className: "text-2xl font-bold text-emerald-700" }, urges.length),
                  React.createElement('div', { className: "text-xs text-emerald-600" }, "Vitórias")
                ]),
                React.createElement('div', { className: "flex-1 text-center p-2 bg-rose-100 rounded-xl" }, [
                  React.createElement('div', { className: "text-2xl font-bold text-rose-700" }, relapses.length),
                  React.createElement('div', { className: "text-xs text-rose-600" }, "Recaídas")
                ])
              ]),
              allEvents.length === 0 ? 
                React.createElement('div', { className: "text-center py-8 text-slate-400" }, "Nenhum evento registrado") :
                allEvents.map(event => {
                  const habit = habits.find(h => h.id === event.habitId);
                  return React.createElement('div', { key: event.id, className: "flex justify-between items-center p-3 border-b border-slate-100" }, [
                    React.createElement('div', { className: "flex items-center gap-3" }, [
                      React.createElement(Icon, { name: event.type === 'resist' ? 'ThumbsUp' : 'RefreshCw', size: 20, className: event.type === 'resist' ? 'text-emerald-600' : 'text-rose-600' }),
                      React.createElement('div', null, [
                        React.createElement('div', { className: "font-bold text-sm" }, event.type === 'resist' ? "Resistiu!" : "Recaída"),
                        React.createElement('div', { className: "text-xs text-slate-400" }, habit?.name)
                      ])
                    ]),
                    React.createElement('div', { className: "text-xs text-slate-400" }, new Date(event.time).toLocaleDateString('pt-BR'))
                  ]);
                })
            ]),
            React.createElement('div', { className: "bg-white rounded-2xl p-5 shadow-sm" }, [
              React.createElement('h2', { className: "text-xl font-bold mb-3 flex items-center gap-2" }, [
                React.createElement(Icon, { name: 'Lightbulb', size: 24 }),
                "Dicas Práticas"
              ]),
              React.createElement('div', { className: "space-y-3 text-sm text-slate-600" }, [
                React.createElement('p', null, "• Quando sentir vontade, respire fundo 10 vezes"),
                React.createElement('p', null, "• Saia do ambiente que está gatilhando"),
                React.createElement('p', null, "• Beba um copo de água gelada"),
                React.createElement('p', null, "• Lembre-se do seu propósito")
              ])
            ])
          ])
        ]),

        // Bottom Nav
        React.createElement('nav', { key: 'nav', className: "fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-200 pb-2 pt-2" },
          React.createElement('div', { className: "max-w-md mx-auto flex justify-around px-4" }, [
            ['trackers', 'Activity', 'Contadores'],
            ['journal', 'BookOpen', 'Diário'],
            ['badges', 'Trophy', 'Conquistas'],
            ['more', 'Menu', 'Mais']
          ].map(([id, icon, label]) => 
            React.createElement('button', {
              key: id,
              onClick: () => setActiveTab(id),
              className: `flex flex-col items-center gap-1 py-1 px-4 rounded-xl transition ${activeTab === id ? 'text-slate-800' : 'text-slate-400'}`
            }, [
              React.createElement(Icon, { name: icon, size: 22, key: 'icon' }),
              React.createElement('span', { className: "text-[11px] font-bold", key: 'label' }, label)
            ])
          ))
        ),

        // Modals
        showEmergency && React.createElement('div', { key: 'emergency', className: "fixed inset-0 bg-slate-900/95 z-50 flex items-center justify-center p-5" },
          React.createElement('div', { className: "bg-white rounded-3xl p-8 text-center max-w-sm w-full" }, [
            React.createElement(Icon, { name: 'Wind', size: 48, className: "text-slate-400 mx-auto mb-4" }),
            React.createElement('h2', { className: "text-2xl font-bold mb-2" }, "Respiração 4-7-8"),
            React.createElement('p', { className: "text-slate-500 mb-6" }, "Inspire 4s, segure 7s, expire 8s"),
            React.createElement('button', {
              onClick: () => setShowEmergency(false),
              className: "w-full bg-slate-800 text-white py-3 rounded-xl font-bold"
            }, "Fechar")
          ])
        ),

        resetModal.show && React.createElement('div', { key: 'resetModal', className: "fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-5" },
          React.createElement('div', { className: "bg-white rounded-2xl p-6 max-w-sm w-full" }, [
            React.createElement('h2', { className: "text-xl font-bold mb-3" }, "Confirmar recaída?"),
            React.createElement('p', { className: "text-slate-500 mb-6" }, "Lembre-se: cada recaída é uma oportunidade de aprender e recomeçar mais forte."),
            React.createElement('div', { className: "flex gap-3" }, [
              React.createElement('button', {
                onClick: () => setResetModal({ show: false, habitId: null }),
                className: "flex-1 py-2 rounded-xl border border-slate-200 font-bold"
              }, "Cancelar"),
              React.createElement('button', {
                onClick: () => handleRelapse(resetModal.habitId),
                className: "flex-1 py-2 rounded-xl bg-rose-600 text-white font-bold"
              }, "Confirmar")
            ])
          ])
        ),

        showAddHabit && React.createElement('div', { key: 'addModal', className: "fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-5" },
          React.createElement('div', { className: "bg-white rounded-2xl p-6 max-w-sm w-full" }, [
            React.createElement('h2', { className: "text-xl font-bold mb-3" }, "Novo Hábito"),
            React.createElement('input', {
              type: "text",
              value: newHabitName,
              onChange: e => setNewHabitName(e.target.value),
              placeholder: "Ex: Parar de fumar",
              className: "w-full border border-slate-200 rounded-xl p-3 mb-4 focus:outline-none focus:border-slate-400"
            }),
            React.createElement('div', { className: "flex gap-3" }, [
              React.createElement('button', {
                onClick: () => setShowAddHabit(false),
                className: "flex-1 py-2 rounded-xl border border-slate-200 font-bold"
              }, "Cancelar"),
              React.createElement('button', {
                onClick: handleAddHabit,
                className: "flex-1 py-2 rounded-xl bg-slate-800 text-white font-bold"
              }, "Adicionar")
            ])
          ])
        )
      ]);
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
