    const { useState, useEffect } = React;

    // --- FUNÇÃO PARA CRIAR ÍCONES LUCIDE DE FORMA COMPATÍVEL ---
    const createIcon = (iconName, size = 24, className = "", strokeWidth = 2) => {
      if (!window.lucide || !window.lucide.icons || !window.lucide.icons[iconName]) {
        console.warn(`Ícone ${iconName} não encontrado`);
        return React.createElement('span', { className: 'w-6 h-6 inline-block' });
      }
      
      const iconData = window.lucide.icons[iconName];
      const svgString = window.lucide.createElement(iconData);
      
      // Modificar atributos do SVG
      const div = document.createElement('div');
      div.innerHTML = svgString;
      const svg = div.firstChild;
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('stroke-width', strokeWidth);
      if (className) svg.setAttribute('class', `lucide ${className}`);
      
      return React.createElement('span', {
        dangerouslySetInnerHTML: { __html: svg.outerHTML },
        style: { display: 'inline-flex' }
      });
    };

      const [notes, setNotes] = useState(() => loadData('jc_notes', []));
      
      const [now, setNow] = useState(Date.now());

      useEffect(() => { saveData('jc_urges', urges); }, [urges]);
      useEffect(() => { saveData('jc_relapses', relapses); }, [relapses]);
      useEffect(() => { saveData('jc_notes', notes); }, [notes]);

        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        return { days, hours, minutes, seconds, totalDays: diff / (1000 * 60 * 60 * 24) };
